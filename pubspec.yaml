name: algoplay
description: Algoplay — Gamified Algorithm Learning App
publish_to: 'none'
version: 1.0.9+200001

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.1.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Navigation
  go_router: ^14.8.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.3.1

  # Monetization
  google_mobile_ads: ^5.3.1
  in_app_purchase: ^3.2.3

  # Visualization
  flutter_highlight: ^0.7.0
  flutter_math_fork: ^0.7.4
  audioplayers: ^6.1.0
  confetti: ^0.8.0

  # Networking
  url_launcher: ^6.3.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.18.0
  path_provider: ^2.1.5
  crypto: ^3.0.6
  tutorial_coach_mark: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/avatars/

  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
